<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Walkie-Talkie Estável</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="login-screen" class="screen-container">
        <h1>Rádio PWA</h1>
        <p>Identifique-se para entrar na frequência:</p>
        <input type="text" id="username-input" placeholder="Seu nome (Ex: Base Alfa)">
        <button id="join-btn">Entrar na Frequência</button>
    </div>

    <div id="radio-screen" class="radio-container" style="display: none;">
        <h1>Walkie-Talkie</h1>
        
        <div class="users-panel">
            <h3>Na Frequência:</h3>
            <ul id="users-list"></ul>
        </div>

        <p id="status">Preparando...</p>
        <button id="ptt-btn" disabled>Pressione para Falar</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
