<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Walkie-Talkie PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="radio-container">
        <h1>Walkie-Talkie</h1>
        
        <p id="status">Aguardando conexão...</p>

        <button id="ptt-btn" disabled>Pressione para Falar</button>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
    <script>
        // Verifica se o navegador suporta Service Workers
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Registra o nosso arquivo sw.js
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('⚙️ Service Worker registrado com sucesso!'))
                    .catch(err => console.error('❌ Erro no Service Worker:', err));
            });
        }
    </script>
</body>
</html>
